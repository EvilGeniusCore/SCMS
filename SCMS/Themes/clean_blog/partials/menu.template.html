<!--
    Clean Blog menu template.
    Renders inside the navbar collapse area.
    Bootstrap 5 dropdowns: click-based, single level only.
-->

<ul class="navbar-nav ms-auto py-2 py-lg-0">
    {{#each Items}}
    {{#if Items}}
    <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle text-uppercase px-lg-3" href="{{Url}}" role="button" data-bs-toggle="dropdown" aria-expanded="false" {{#if Target}} target="{{Target}}" {{/if}}>
            {{Text}}
        </a>
        <ul class="dropdown-menu">
            {{#each Items}}
            <li>
                <a class="dropdown-item" href="{{Url}}" {{#if Target}} target="{{Target}}" {{/if}}>{{Text}}</a>
            </li>
            {{/each}}
        </ul>
    </li>
    {{else}}
    <li class="nav-item">
        <a class="nav-link text-uppercase px-lg-3" href="{{Url}}" {{#if Target}} target="{{Target}}" {{/if}}>{{Text}}</a>
    </li>
    {{/if}}
    {{/each}}
</ul>
