<!--
    Default Bootstrap menu template with unlimited nesting depth.
    Uses {{SubMenuHtml}} for pre-rendered recursive submenus.
    Hover-driven via CSS — no Bootstrap JS dropdown dependency for submenus.
-->

<ul class="navbar-nav me-auto mb-2 mb-lg-0">
    {{#each Items}}
    {{#if Items}}
    <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="{{Url}}" role="button" data-bs-toggle="dropdown" aria-expanded="false" {{#if Target}} target="{{Target}}" {{/if}}>
            {{Text}}
        </a>
        {{SubMenuHtml}}
    </li>
    {{else}}
    <li class="nav-item">
        <a class="nav-link" href="{{Url}}" {{#if Target}} target="{{Target}}" {{/if}}>{{Text}}</a>
    </li>
    {{/if}}
    {{/each}}
</ul>
